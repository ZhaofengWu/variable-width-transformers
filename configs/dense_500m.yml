training_parameters:
  num_training_steps: 23844
  eval_interval: 1000000000
  micro_batch_size: 4
  gradient_accumulation_steps: 8
  eval_during_training: false

optimizer_args:
  params_group_method: mup
  class_name: TorchAdamW
  class_args:
    lr: 0.01
    weight_decay: 0.1
    betas:
      - 0.9
      - 0.95
    eps: 1e-10

lr_scheduler_args:
  lr_decay_style: power
  num_warmup_steps: 1908
  num_constant_steps: 0
  num_decay_steps: 21936
  extra_lr_scheduler_args:
    a: 1024
    b: -0.566
    c: 1048576

mixed_precision_args:
  dtype: bf16

distributed_args:
  fsdp_algorithm: 2
  torch_compile: true
  stage: 2
